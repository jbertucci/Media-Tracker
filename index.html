<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Media Tracker</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #252525;
      --accent: #e50914;
      --text: #e0e0e0;
      --muted: #888;
      --border: #333;
      --radius: 10px;
      --green: #4caf50;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 1.15rem; font-weight: 700; color: var(--accent); }

    .tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      color: var(--muted);
      font-size: 0.9rem;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      user-select: none;
    }

    .tab.active { color: var(--text); border-bottom-color: var(--accent); }

    main { flex: 1; overflow-y: auto; padding: 14px; }

    .view { display: none; }
    .view.active { display: block; }

    .search-row { display: flex; gap: 8px; margin-bottom: 14px; }

    input[type="text"], input[type="date"], input[type="password"] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 10px 14px;
      font-size: 1rem;
      width: 100%;
      outline: none;
      -webkit-appearance: none;
      color-scheme: dark;
    }

    input:focus { border-color: var(--accent); }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 10px 18px;
      font-size: 1rem;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    button:active { opacity: 0.8; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-icon {
      background: transparent;
      color: var(--muted);
      font-size: 1.2rem;
      padding: 4px 8px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
    }

    .card-body { padding: 12px; }
    .card-title { font-weight: 600; font-size: 1rem; }
    .card-year { color: var(--muted); font-size: 0.8rem; margin-top: 2px; }

    .card-overview {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-actions {
      padding: 10px 12px;
      background: var(--surface2);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .card-actions input[type="date"] { padding: 7px 10px; font-size: 0.9rem; }
    .card-actions button { padding: 7px 16px; font-size: 0.9rem; }

    .btn-added { background: var(--green) !important; }

    .movie-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .movie-item .info { flex: 1; min-width: 0; }
    .movie-item .m-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .movie-item .m-meta { color: var(--muted); font-size: 0.8rem; margin-top: 2px; }

    .empty { text-align: center; color: var(--muted); padding: 48px 20px; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--surface2);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 0.88rem;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--green); }
    .toast.error { border-color: var(--accent); }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 200;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 380px;
    }

    .modal h2 { font-size: 1.1rem; margin-bottom: 6px; }
    .modal p { color: var(--muted); font-size: 0.85rem; margin-bottom: 16px; line-height: 1.4; }
    .modal input { margin-bottom: 12px; }
    .modal button { width: 100%; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading { text-align: center; color: var(--muted); padding: 32px; }

    /* ── Stats ── */
    .stat-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 8px; text-align: center; }
    .stat-num { font-size: 1.5rem; font-weight: 700; color: var(--accent); line-height: 1; }
    .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }

    .highlights { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; margin-bottom: 16px; }
    .hl-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; min-width: 0; }
    .hl-tag { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
    .hl-val { font-size: 0.88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hl-sub { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }

    .stat-section { margin-bottom: 18px; }
    .stat-section h3 { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 9px; }

    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .bar-label { width: 110px; font-size: 0.8rem; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
    .bar-track { flex: 1; height: 22px; background: var(--surface2); border-radius: 4px; overflow: hidden; position: relative; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.55s ease-out; }
    .bar-count { position: absolute; right: 7px; top: 50%; transform: translateY(-50%); font-size: 0.72rem; font-weight: 600; }

    .split-bar { height: 26px; display: flex; border-radius: 6px; overflow: hidden; margin-bottom: 8px; }
    .split-seg { height: 100%; transition: width 0.55s ease-out; }
    .split-legend { display: flex; flex-wrap: wrap; gap: 6px 14px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.8rem; }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    .bar-row.clickable, .legend-item.clickable { cursor: pointer; }
    .bar-row.clickable:hover .bar-label { color: var(--accent); }
    .legend-item.clickable:hover { opacity: 0.8; }

    .drill-modal .modal { max-height: 80dvh; display: flex; flex-direction: column; }
    .drill-modal .modal h2 { flex-shrink: 0; }
    .drill-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-shrink: 0; }
    .drill-header h2 { font-size: 1rem; }
    .drill-scroll { overflow-y: auto; flex: 1; }
    .drill-item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .drill-item:last-child { border-bottom: none; }
    .drill-num { color: var(--muted); font-size: 0.78rem; width: 22px; text-align: right; flex-shrink: 0; }
    .drill-info { flex: 1; min-width: 0; }
    .drill-title { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .drill-meta { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }

    /* ── Battle overlay ── */
    #battle-overlay { position:fixed; inset:0; background:var(--bg); z-index:150; display:flex; flex-direction:column; overflow:hidden; }
    .bo-header { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 16px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .bo-header .bo-title { font-weight:700; color:var(--accent); font-size:1rem; }
    #bo-battle, #bo-rankings { flex:1; overflow-y:auto; display:flex; flex-direction:column; }
    .battle-progress { text-align:center; color:var(--muted); font-size:0.8rem; padding:8px 16px; border-bottom:1px solid var(--border); flex-shrink:0; }
    .battle-arena { display:flex; gap:8px; padding:12px; align-items:flex-start; }
    .battle-card { flex:1; background:var(--surface); border:2px solid var(--border); border-radius:var(--radius); cursor:pointer; overflow:hidden; transition:border-color 0.15s, opacity 0.3s; -webkit-tap-highlight-color:transparent; }
    .battle-card:active { opacity:0.85; }
    .battle-poster { width:100%; aspect-ratio:2/3; object-fit:cover; display:block; background:var(--surface2); }
    .battle-details { padding:8px; }
    .battle-title { font-weight:600; font-size:0.82rem; line-height:1.3; }
    .battle-year { color:var(--muted); font-size:0.72rem; margin-bottom:5px; }
    .battle-fact { font-size:0.72rem; color:var(--muted); margin-bottom:3px; line-height:1.3; }
    .battle-fact b { color:var(--text); font-weight:600; margin-right:3px; }
    .battle-vs { align-self:center; font-size:0.9rem; font-weight:700; color:var(--muted); flex-shrink:0; }
    .battle-winner { border-color:var(--green) !important; }
    .battle-loser { opacity:0.35 !important; pointer-events:none; }
    .battle-placed { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px; }
    .bp-rank { font-size:3.5rem; font-weight:700; color:var(--accent); line-height:1; }
    .bp-label { color:var(--muted); margin-top:8px; font-size:0.9rem; }
    .rank-item { display:flex; align-items:center; gap:10px; padding:10px 16px; border-bottom:1px solid var(--border); }
    .rank-num { color:var(--accent); font-weight:700; font-size:0.9rem; width:30px; text-align:right; flex-shrink:0; }
    .rank-info { flex:1; min-width:0; }
    .rank-title { font-weight:600; font-size:0.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .rank-meta { color:var(--muted); font-size:0.75rem; margin-top:1px; }
    .bo-section-label { padding:10px 16px 6px; color:var(--muted); font-size:0.72rem; text-transform:uppercase; letter-spacing:0.07em; }
    .battle-btn { width:100%; background:var(--surface); color:var(--text); border:1px solid var(--border); margin-bottom:12px; }
    .battle-btn:active { background:var(--surface2); }

    /* ── Games ── */
    .game-subnav { display:flex; gap:6px; margin-bottom:12px; }
    .game-subnav button { flex:1; background:var(--surface); color:var(--muted); border:1px solid var(--border); font-size:0.85rem; padding:8px; }
    .game-subnav button.active { color:var(--text); border-color:var(--accent); }
    .status-pills { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
    .status-pill { background:var(--surface); color:var(--muted); border:1px solid var(--border); border-radius:20px; padding:5px 12px; font-size:0.78rem; cursor:pointer; }
    .status-pill.active { color:var(--text); border-color:var(--accent); }
    .status-badge { display:inline-block; font-size:0.7rem; font-weight:600; padding:2px 7px; border-radius:10px; }
    .badge-completed  { background:#1b3a1f; color:#4caf50; }
    .badge-playing    { background:#1a2a4a; color:#5b8dee; }
    .badge-want_to_play { background:#3a2a0a; color:#ff9800; }
    .badge-dropped    { background:#2a1a1a; color:#888; }
    .game-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:10px; overflow:hidden; }
    .game-card-body { padding:12px; display:flex; gap:10px; align-items:flex-start; }
    .game-cover-lg { width:54px; height:72px; object-fit:cover; border-radius:4px; flex-shrink:0; background:var(--surface2); }
    .game-cover-sm { width:40px; height:53px; object-fit:cover; border-radius:4px; flex-shrink:0; background:var(--surface2); }
    .game-card-info { flex:1; min-width:0; }
    .game-card-title { font-weight:600; font-size:0.95rem; }
    .game-card-meta { color:var(--muted); font-size:0.78rem; margin-top:2px; }
    .game-card-overview { font-size:0.78rem; color:var(--muted); margin-top:4px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .game-card-actions { padding:8px 12px; background:var(--surface2); display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .game-card-actions select { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); padding:6px 8px; font-size:0.85rem; flex:1; outline:none; }
    .game-card-actions input[type="date"] { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); padding:6px 8px; font-size:0.85rem; flex:1; outline:none; color-scheme:dark; }
    .game-card-actions button { padding:6px 14px; font-size:0.85rem; }
    .game-item { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:10px 12px; margin-bottom:8px; display:flex; align-items:center; gap:10px; }
    .game-item .gi-info { flex:1; min-width:0; }
    .game-item .gi-title { font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .game-item .gi-meta { color:var(--muted); font-size:0.78rem; margin-top:3px; }

    .note-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--accent); margin-left:5px; vertical-align:middle; flex-shrink:0; }
    .status-picker-modal .modal { max-width:320px; }
    .status-picker-modal h2 { font-size:0.95rem; margin-bottom:14px; }
    .status-options { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
    .status-opt { background:var(--surface2); border:2px solid var(--border); border-radius:var(--radius); padding:10px; text-align:center; cursor:pointer; font-size:0.85rem; transition:border-color 0.15s; }
    .status-opt.selected { border-color:var(--accent); color:var(--text); }
    .status-opt:not(.selected) { color:var(--muted); }
    #status-picker-date { margin-bottom:12px; display:none; }
    .notes-modal .modal { max-height:85dvh; display:flex; flex-direction:column; }
    .notes-modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-shrink:0; }
    .notes-modal-header h2 { font-size:1rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:80%; }
    #notes-textarea { flex:1; min-height:220px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); padding:10px 12px; font-size:0.92rem; line-height:1.5; resize:none; outline:none; font-family:inherit; color-scheme:dark; }
    #notes-textarea:focus { border-color:var(--accent); }
    .notes-save-btn { margin-top:10px; flex-shrink:0; }

    .poster-sm { width: 40px; height: 60px; object-fit: cover; border-radius: 4px; flex-shrink: 0; background: var(--surface2); }
    .poster-xs { width: 33px; height: 50px; object-fit: cover; border-radius: 3px; flex-shrink: 0; background: var(--surface2); }
    .card-poster { width: 54px; height: 81px; object-fit: cover; border-radius: 6px; flex-shrink: 0; background: var(--surface2); }
  </style>
</head>
<body>

<header>
  <h1>Media Tracker</h1>
  <button class="btn-icon" onclick="showKeyModal()" title="Settings">&#9881;</button>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('movies')">Movies</div>
  <div class="tab" onclick="switchTab('games')">Games</div>
</div>

<main>
  <div id="movies-view" class="view active">
    <div class="game-subnav">
      <button id="msub-search" class="active" onclick="setMovieSubview('search')">Search</button>
      <button id="msub-list" onclick="setMovieSubview('list')">My Movies</button>
      <button id="msub-stats" onclick="setMovieSubview('stats')">Stats</button>
    </div>
    <div id="movie-search-pane">
      <div class="search-row">
        <input type="text" id="search-input" placeholder="Movie title..."
               onkeydown="if(event.key==='Enter') doSearch()">
        <button id="search-btn" onclick="doSearch()">Search</button>
      </div>
      <div id="search-results"></div>
    </div>
    <div id="movie-list-pane" style="display:none">
      <button class="battle-btn" onclick="openBattle()">&#9876; Movie Battles</button>
      <div id="movies-list"><div class="loading">Loading&hellip;</div></div>
    </div>
    <div id="movie-stats-pane" style="display:none">
      <div id="stats-content"><div class="loading">Loading&hellip;</div></div>
    </div>
  </div>

  <div id="games-view" class="view">
    <div class="game-subnav">
      <button id="gsub-search" class="active" onclick="setGameSubview('search')">Search</button>
      <button id="gsub-list" onclick="setGameSubview('list')">My Games</button>
      <button id="gsub-stats" onclick="setGameSubview('stats')">Stats</button>
    </div>
    <div id="game-search-pane">
      <div class="search-row">
        <input type="text" id="game-search-input" placeholder="Game title..."
               onkeydown="if(event.key==='Enter') doGameSearch()">
        <button id="game-search-btn" onclick="doGameSearch()">Search</button>
      </div>
      <div id="game-search-results"></div>
    </div>
    <div id="game-stats-pane" style="display:none">
      <div id="game-stats-content"><div class="loading">Loading&hellip;</div></div>
    </div>
    <div id="game-list-pane" style="display:none">
      <button class="battle-btn" onclick="openBattle('games')">&#9876; Game Battles</button>
      <div class="status-pills">
        <div class="status-pill active" data-status="" onclick="setGameFilter(this)">All</div>
        <div class="status-pill" data-status="playing" onclick="setGameFilter(this)">Playing</div>
        <div class="status-pill" data-status="completed" onclick="setGameFilter(this)">Completed</div>
        <div class="status-pill" data-status="want_to_play" onclick="setGameFilter(this)">Want to Play</div>
        <div class="status-pill" data-status="dropped" onclick="setGameFilter(this)">Dropped</div>
      </div>
      <div id="game-list"></div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<div class="modal-backdrop status-picker-modal" id="status-picker-modal" style="display:none" onclick="if(event.target===this)closeStatusPicker()">
  <div class="modal">
    <h2 id="status-picker-title">Change Status</h2>
    <div class="status-options">
      <div class="status-opt" data-value="completed"    onclick="selectStatus(this)">Completed</div>
      <div class="status-opt" data-value="playing"      onclick="selectStatus(this)">Playing</div>
      <div class="status-opt" data-value="want_to_play" onclick="selectStatus(this)">Want to Play</div>
      <div class="status-opt" data-value="dropped"      onclick="selectStatus(this)">Dropped</div>
    </div>
    <input type="date" id="status-picker-date" value="">
    <button onclick="saveStatus()">Save</button>
    <button onclick="closeStatusPicker()" style="background:var(--surface2);color:var(--text);margin-top:6px;width:100%">Cancel</button>
  </div>
</div>

<div class="modal-backdrop notes-modal" id="notes-modal" style="display:none" onclick="if(event.target===this)closeNotes()">
  <div class="modal">
    <div class="notes-modal-header">
      <h2 id="notes-modal-title"></h2>
      <button class="btn-icon" onclick="closeNotes()" style="font-size:1.3rem">&times;</button>
    </div>
    <textarea id="notes-textarea" placeholder="Write your review or journal entry&hellip;"></textarea>
    <button class="notes-save-btn" onclick="saveNotes()">Save</button>
  </div>
</div>

<div id="battle-overlay" style="display:none">
  <div class="bo-header">
    <button class="btn-icon" onclick="closeBattle()">&#8592;</button>
    <span class="bo-title" id="bo-title">Movie Battles</span>
    <button class="btn-icon" id="bo-right-btn" onclick="showBattleRankings()">Rankings</button>
  </div>
  <div id="bo-battle">
    <div class="battle-progress" id="bo-progress"></div>
    <div class="battle-arena" id="bo-arena"></div>
  </div>
  <div id="bo-rankings" style="display:none">
    <div id="bo-rankings-list"></div>
  </div>
</div>

<div class="modal-backdrop drill-modal" id="drill-modal" style="display:none" onclick="if(event.target===this)closeDrill()">
  <div class="modal">
    <div class="drill-header">
      <h2 id="drill-title"></h2>
      <button class="btn-icon" onclick="closeDrill()" style="font-size:1.3rem">&times;</button>
    </div>
    <div class="drill-scroll" id="drill-list"></div>
  </div>
</div>

<div class="modal-backdrop" id="key-modal">
  <div class="modal">
    <h2>API Key</h2>
    <p>Enter the key from your <code>flask_api_key.txt</code> file to access your tracker.</p>
    <input type="password" id="key-input" placeholder="Your API key"
           onkeydown="if(event.key==='Enter') saveKey()">
    <button onclick="saveKey()">Save &amp; Connect</button>
  </div>
</div>

<script>
  let apiKey = localStorage.getItem('mediaApiKey') || '';

  if (apiKey) {
    document.getElementById('key-modal').style.display = 'none';
  }

  // ── Auth & fetch ──────────────────────────────────────────────────────────

  async function apiFetch(path, options = {}) {
    const res = await fetch(path, {
      ...options,
      headers: { 'X-API-Key': apiKey, ...(options.headers || {}) },
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
    return json;
  }

  // ── Toast ─────────────────────────────────────────────────────────────────

  function toast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${type} show`;
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 3000);
  }

  // ── Tabs ──────────────────────────────────────────────────────────────────

  function switchTab(tab) {
    const tabs = ['movies', 'games'];
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', tabs[i] === tab);
    });
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(`${tab}-view`).classList.add('active');
  }

  function setMovieSubview(view) {
    ['search', 'list', 'stats'].forEach(v => {
      document.getElementById(`movie-${v}-pane`).style.display = v === view ? 'block' : 'none';
      document.getElementById(`msub-${v}`).classList.toggle('active', v === view);
    });
    if (view === 'list') loadMovies();
    if (view === 'stats') loadStats();
  }

  // ── API key modal ─────────────────────────────────────────────────────────

  function showKeyModal() {
    document.getElementById('key-input').value = apiKey;
    document.getElementById('key-modal').style.display = 'flex';
    setTimeout(() => document.getElementById('key-input').focus(), 100);
  }

  function saveKey() {
    const val = document.getElementById('key-input').value.trim();
    if (!val) return;
    apiKey = val;
    localStorage.setItem('mediaApiKey', val);
    document.getElementById('key-modal').style.display = 'none';
    toast('API key saved', 'success');
  }

  // ── Search ────────────────────────────────────────────────────────────────

  async function doSearch() {
    const title = document.getElementById('search-input').value.trim();
    if (!title) return;

    const btn = document.getElementById('search-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    const resultsEl = document.getElementById('search-results');
    resultsEl.innerHTML = '';

    try {
      const results = await apiFetch(`/search?title=${encodeURIComponent(title)}`);
      if (!results.length) {
        resultsEl.innerHTML = '<div class="empty">No results found.</div>';
        return;
      }
      resultsEl.innerHTML = results.map(r => `
        <div class="card">
          <div class="card-body" style="display:flex;gap:12px;align-items:flex-start">
            ${posterImg(r.poster_path, 'card-poster', 'w92')}
            <div style="flex:1;min-width:0">
              <div class="card-title">${esc(r.title)}</div>
              <div class="card-year">${r.year || 'Year unknown'}</div>
              ${r.overview ? `<div class="card-overview">${esc(r.overview)}</div>` : ''}
            </div>
          </div>
          <div class="card-actions" style="flex-wrap:wrap">
            <div style="display:flex;gap:6px;width:100%">
              <button class="movie-status-pill active" data-id="${r.id}" data-value="watched"
                      onclick="setMovieAddStatus(this)" style="flex:1;padding:6px;font-size:0.8rem;background:var(--surface);color:var(--text);border:1px solid var(--accent)">Watched</button>
              <button class="movie-status-pill" data-id="${r.id}" data-value="want_to_watch"
                      onclick="setMovieAddStatus(this)" style="flex:1;padding:6px;font-size:0.8rem;background:var(--surface);color:var(--muted);border:1px solid var(--border)">Want to Watch</button>
            </div>
            <input type="date" id="date-${r.id}" value="${today()}">
            <button data-id="${r.id}" data-title="${esc(r.title)}" data-date="date-${r.id}"
                    onclick="addMovieBtn(this)">Add</button>
          </div>
        </div>
      `).join('');
    } catch (e) {
      toast(e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Search';
    }
  }

  // ── Add movie ─────────────────────────────────────────────────────────────

  function setMovieAddStatus(btn) {
    const id = btn.dataset.id;
    document.querySelectorAll(`.movie-status-pill[data-id="${id}"]`).forEach(b => {
      const active = b === btn;
      b.classList.toggle('active', active);
      b.style.borderColor = active ? 'var(--accent)' : 'var(--border)';
      b.style.color = active ? 'var(--text)' : 'var(--muted)';
    });
    const dateEl = document.getElementById(`date-${id}`);
    if (dateEl) dateEl.style.display = btn.dataset.value === 'watched' ? 'block' : 'none';
  }

  function addMovieBtn(btn) {
    const { id, title, date } = btn.dataset;
    addMovie(parseInt(id), title, date, btn);
  }

  async function addMovie(tmdbId, title, dateInputId, btn) {
    const dateEl  = document.getElementById(dateInputId);
    const dateVal = dateEl?.style.display !== 'none' ? dateEl?.value : null;
    const statusBtn = document.querySelector(`.movie-status-pill[data-id="${tmdbId}"].active`);
    const status  = statusBtn?.dataset.value || 'watched';
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    try {
      await apiFetch('/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tmdb_id: tmdbId, date_watched: dateVal || null, status }),
      });
      btn.textContent = '✓ Added';
      btn.classList.add('btn-added');
      toast(`Added: ${title}`, 'success');
    } catch (e) {
      toast(e.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Add';
    }
  }

  // ── Movie list ────────────────────────────────────────────────────────────

  async function loadMovies() {
    const el = document.getElementById('movies-list');
    el.innerHTML = '<div class="loading">Loading&hellip;</div>';
    try {
      const movies = await apiFetch('/movies');
      if (!movies.length) {
        el.innerHTML = '<div class="empty">No movies yet.</div>';
        return;
      }
      el.innerHTML = movies.map(m => `
        <div class="movie-item" id="mi-${m.id}">
          ${posterImg(m.poster_path, 'poster-sm')}
          <div class="info" style="cursor:pointer" onclick="openNotes('movie',${m.id},'${esc(m.title)}')">
            <div class="m-title">${esc(m.title)}${m.has_notes ? '<span class="note-dot"></span>' : ''}</div>
            <div class="m-meta">
              ${m.year || '—'} &middot;
              <span onclick="event.stopPropagation();openStatusPicker('movie',${m.id},'${esc(m.title)}','${m.status}','')" style="cursor:pointer">${statusBadge(m.status)}</span>
              ${m.status === 'watched' ? '&middot; ' + m.watch_count + 'x watched' + (m.last_watched ? ' &middot; ' + m.last_watched.slice(0,10) : '') : ''}
            </div>
          </div>
          <button class="btn-icon" data-id="${m.id}" data-title="${esc(m.title)}"
                  onclick="removeMovieBtn(this)" title="Remove">&times;</button>
        </div>
      `).join('');
    } catch (e) {
      toast(e.message, 'error');
      el.innerHTML = '';
    }
  }

  // ── Remove movie ──────────────────────────────────────────────────────────

  function removeMovieBtn(btn) {
    removeMovie(btn.dataset.id, btn.dataset.title);
  }

  async function removeMovie(id, title) {
    if (!confirm(`Remove "${title}"?`)) return;
    try {
      await apiFetch(`/movie/${id}`, { method: 'DELETE' });
      document.getElementById(`mi-${id}`)?.remove();
      toast(`Removed: ${title}`, 'success');
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  // ── Stats ─────────────────────────────────────────────────────────────────

  async function loadStats() {
    const el = document.getElementById('stats-content');
    el.innerHTML = '<div class="loading">Loading&hellip;</div>';
    try {
      renderStats(await apiFetch('/stats'));
    } catch (e) {
      toast(e.message, 'error');
      el.innerHTML = '';
    }
  }

  function renderStats(s) {
    const el = document.getElementById('stats-content');
    const h = s.highlights;

    const highlights = [
      h.longest     ? { tag: 'Longest Film',    val: h.longest.title,     sub: `${h.longest.runtime} min` }       : null,
      h.most_watched? { tag: 'Most Rewatched',  val: h.most_watched.title, sub: `${h.most_watched.watch_count}× watched` } : null,
      h.top_rated   ? { tag: 'Highest Rated',   val: h.top_rated.title,   sub: `★ ${h.top_rated.vote_average}` }  : null,
    ].filter(Boolean);

    el.innerHTML = `
      <div class="stat-summary">
        <div class="stat-card"><div class="stat-num">${s.summary.total_films}</div><div class="stat-label">Films</div></div>
        <div class="stat-card"><div class="stat-num">${s.summary.total_hours}h</div><div class="stat-label">Watched</div></div>
        <div class="stat-card"><div class="stat-num">${s.summary.avg_rating ?? '—'}</div><div class="stat-label">Avg Rating</div></div>
      </div>

      ${highlights.length ? `<div class="highlights">${highlights.map(h => `
        <div class="hl-card">
          <div class="hl-tag">${esc(h.tag)}</div>
          <div class="hl-val">${esc(h.val)}</div>
          <div class="hl-sub">${esc(h.sub)}</div>
        </div>`).join('')}</div>` : ''}

      ${barsHTML('Top Directors',         s.top_directors,  '#e50914', 'director')}
      ${barsHTML('Top Cast (Lead Roles)', s.top_actors,     '#5b8dee', 'actor')}
      ${barsHTML('Genres',                s.top_genres,     '#4caf50', 'genre')}
      ${barsHTML('Top Release Years',     s.top_years,      '#ff9800', 'year')}
      ${barsHTML('By Decade',             s.decades,        '#ff9800', 'decade')}
      ${splitBarHTML('Cast Gender',       s.cast_gender,    'gender')}
      ${s.cast_ethnicity.length ? barsHTML('Cast Ethnicity', s.cast_ethnicity, '#7c5cbf', 'ethnicity') : ''}
    `;

    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.querySelectorAll('[data-w]').forEach(b => { b.style.width = b.dataset.w; });
    }));
  }

  function barsHTML(title, items, color, drillType, clickFn = 'drillRow') {
    if (!items?.length) return '';
    const max = Math.max(...items.map(i => i.count));
    return `<div class="stat-section"><h3>${esc(title)}</h3>${items.map(item => {
      const name  = item.name || item.label;
      const pct   = (item.count / max * 100).toFixed(1);
      const click = drillType ? `class="bar-row clickable" data-drill-type="${drillType}" data-drill-val="${esc(name)}" onclick="${clickFn}(this)"` : `class="bar-row"`;
      return `<div ${click}>
        <div class="bar-label" title="${esc(name)}">${esc(name)}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:0; background:${color}" data-w="${pct}%"></div>
          <span class="bar-count">${item.count}</span>
        </div></div>`;
    }).join('')}</div>`;
  }

  function splitBarHTML(title, items, drillType, clickFn = 'drillRow') {
    if (!items?.length) return '';
    const total = items.reduce((s, i) => s + i.count, 0);
    if (!total) return '';
    const colors = { Female: '#e8528a', Male: '#5b8dee', 'Non-Binary': '#7c5cbf' };
    return `<div class="stat-section"><h3>${esc(title)}</h3>
      <div class="split-bar">${items.map(i => {
        const pct   = (i.count / total * 100).toFixed(1);
        const color = colors[i.label] || '#888';
        return `<div class="split-seg" style="width:0; background:${color}" data-w="${pct}%" title="${esc(i.label)}: ${pct}%"></div>`;
      }).join('')}</div>
      <div class="split-legend">${items.map(i => {
        const pct   = (i.count / total * 100).toFixed(0);
        const color = colors[i.label] || '#888';
        const click = drillType ? `class="legend-item clickable" data-drill-type="${drillType}" data-drill-val="${esc(i.label)}" onclick="${clickFn}(this)"` : `class="legend-item"`;
        return `<div ${click}><span class="legend-dot" style="background:${color}"></span><span>${esc(i.label)} ${pct}%</span></div>`;
      }).join('')}</div>
    </div>`;
  }

  // ── Status picker (movies + games) ───────────────────────────────────────

  const MOVIE_STATUSES = [
    { value: 'watched',       label: 'Watched' },
    { value: 'want_to_watch', label: 'Want to Watch' },
  ];
  const GAME_STATUSES = [
    { value: 'completed',    label: 'Completed' },
    { value: 'playing',      label: 'Playing' },
    { value: 'want_to_play', label: 'Want to Play' },
    { value: 'dropped',      label: 'Dropped' },
  ];
  const DATE_STATUSES = ['completed', 'dropped'];

  let statusPickerTarget = null;

  function openStatusPicker(type, id, name, currentStatus, currentDate) {
    statusPickerTarget = { type, id };
    document.getElementById('status-picker-title').textContent = name;
    const opts = type === 'movie' ? MOVIE_STATUSES : GAME_STATUSES;
    document.querySelector('.status-options').innerHTML = opts.map(o =>
      `<div class="status-opt${o.value === currentStatus ? ' selected' : ''}" data-value="${o.value}" onclick="selectStatus(this)">${o.label}</div>`
    ).join('');
    const dateEl = document.getElementById('status-picker-date');
    dateEl.value = currentDate ? currentDate.slice(0, 10) : today();
    dateEl.style.display = DATE_STATUSES.includes(currentStatus) ? 'block' : 'none';
    document.getElementById('status-picker-modal').style.display = 'flex';
  }

  function selectStatus(el) {
    document.querySelectorAll('.status-opt').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('status-picker-date').style.display =
      DATE_STATUSES.includes(el.dataset.value) ? 'block' : 'none';
  }

  async function saveStatus() {
    const { type, id } = statusPickerTarget;
    const status = document.querySelector('.status-opt.selected')?.dataset.value;
    if (!status) return;
    const dateEl = document.getElementById('status-picker-date');
    const date_completed = dateEl.style.display !== 'none' ? dateEl.value : null;
    const body = type === 'movie' ? { status } : { status, date_completed };
    try {
      await apiFetch(`/${type}s/${id}/status`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      closeStatusPicker();
      if (type === 'game') loadGameList(currentGameFilter);
      else loadMovies();
      toast('Status updated', 'success');
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  function closeStatusPicker() {
    document.getElementById('status-picker-modal').style.display = 'none';
    statusPickerTarget = null;
  }

  // ── Notes ─────────────────────────────────────────────────────────────────

  let notesTarget = null;

  async function openNotes(type, id, title) {
    notesTarget = { type, id };
    document.getElementById('notes-modal-title').textContent = title;
    document.getElementById('notes-textarea').value = '';
    document.getElementById('notes-modal').style.display = 'flex';
    try {
      const data = await apiFetch(`/${type}s/${id}/notes`);
      document.getElementById('notes-textarea').value = data.notes || '';
    } catch (_) {}
    document.getElementById('notes-textarea').focus();
  }

  async function saveNotes() {
    if (!notesTarget) return;
    const { type, id } = notesTarget;
    const notes = document.getElementById('notes-textarea').value;
    try {
      await apiFetch(`/${type}s/${id}/notes`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ notes }),
      });
      // Update note dot without reloading the full list
      const item = document.getElementById(type === 'movie' ? `mi-${id}` : `gi-${id}`);
      if (item) {
        const titleEl = item.querySelector('.m-title, .gi-title');
        const existing = titleEl?.querySelector('.note-dot');
        if (notes.trim() && !existing) {
          titleEl.insertAdjacentHTML('beforeend', '<span class="note-dot"></span>');
        } else if (!notes.trim() && existing) {
          existing.remove();
        }
      }
      closeNotes();
      toast('Notes saved', 'success');
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  function closeNotes() {
    document.getElementById('notes-modal').style.display = 'none';
    notesTarget = null;
  }

  // ── Games ─────────────────────────────────────────────────────────────────

  const IGDB_IMG = 'https://images.igdb.com/igdb/image/upload/';
  function igdbCoverUrl(imageId, size = 'cover_big') {
    return imageId ? `${IGDB_IMG}t_${size}/${imageId}.jpg` : null;
  }
  function igdbCoverImg(imageId, cls, size = 'cover_big') {
    const url = igdbCoverUrl(imageId, size);
    return url ? `<img class="${cls}" src="${url}" alt="" loading="lazy">` : `<div class="${cls}"></div>`;
  }

  const STATUS_LABELS = {
    completed: 'Completed', playing: 'Playing', want_to_play: 'Want to Play', dropped: 'Dropped',
    watched: 'Watched', want_to_watch: 'Want to Watch',
  };
  const STATUS_COLORS = {
    completed: '#4caf50', playing: '#5b8dee', want_to_play: '#ff9800', dropped: '#888',
    watched: '#4caf50', want_to_watch: '#ff9800',
  };

  function statusBadge(status) {
    const gameBadged = ['completed','playing','want_to_play','dropped'].includes(status);
    if (gameBadged) return `<span class="status-badge badge-${status}">${STATUS_LABELS[status] || status}</span>`;
    const bg  = status === 'watched' ? '#1b3a1f' : '#3a2a0a';
    const col = STATUS_COLORS[status] || '#888';
    return `<span class="status-badge" style="background:${bg};color:${col}">${STATUS_LABELS[status] || status}</span>`;
  }

  function setGameSubview(view) {
    ['search', 'list', 'stats'].forEach(v => {
      document.getElementById(`game-${v}-pane`).style.display = v === view ? 'block' : 'none';
      document.getElementById(`gsub-${v}`).classList.toggle('active', v === view);
    });
    if (view === 'list')  loadGameList('');
    if (view === 'stats') loadGameStats();
  }

  async function loadGameStats() {
    const el = document.getElementById('game-stats-content');
    el.innerHTML = '<div class="loading">Loading&hellip;</div>';
    try {
      renderGameStats(await apiFetch('/games/stats'));
    } catch (e) {
      toast(e.message, 'error');
      el.innerHTML = '';
    }
  }

  function renderGameStats(s) {
    const el = document.getElementById('game-stats-content');
    const statusColors = { Completed: '#4caf50', Playing: '#5b8dee', 'Want to Play': '#ff9800', Dropped: '#888' };

    el.innerHTML = `
      <div class="stat-summary">
        <div class="stat-card"><div class="stat-num">${s.summary.total}</div><div class="stat-label">Games</div></div>
        <div class="stat-card"><div class="stat-num">${s.summary.completed}</div><div class="stat-label">Completed</div></div>
        <div class="stat-card clickable" style="cursor:pointer" onclick="gameDrillDown('fully_completed','1')"><div class="stat-num">${s.summary.completion_rate}%</div><div class="stat-label">100%'d</div></div>
      </div>

      ${barsHTML('Top Developers',     s.top_developers, '#e50914', 'developer',  'gameDrillRow')}
      ${barsHTML('Top Publishers',     s.top_publishers, '#5b8dee', 'publisher',  'gameDrillRow')}
      ${barsHTML('Genres',             s.top_genres,     '#4caf50', 'genre',      'gameDrillRow')}
      ${s.perspectives.length ? barsHTML('Camera Perspective', s.perspectives, '#7c5cbf', 'perspective', 'gameDrillRow') : ''}
      ${barsHTML('Completions by Year', s.by_year,       '#ff9800', 'year',       'gameDrillRow')}

      ${s.status_breakdown.length > 1 ? `
      <div class="stat-section"><h3>Library Breakdown</h3>
        <div class="split-bar">
          ${s.status_breakdown.map(i => {
            const total = s.status_breakdown.reduce((a, b) => a + b.count, 0);
            const pct   = (i.count / total * 100).toFixed(1);
            const color = statusColors[i.label] || '#888';
            const apiVal = i.label.toLowerCase().replace(/ /g, '_');
            return `<div class="split-seg" style="width:0; background:${color}" data-w="${pct}%" title="${esc(i.label)}: ${pct}%"></div>`;
          }).join('')}
        </div>
        <div class="split-legend">
          ${s.status_breakdown.map(i => {
            const total  = s.status_breakdown.reduce((a, b) => a + b.count, 0);
            const pct    = (i.count / total * 100).toFixed(0);
            const color  = statusColors[i.label] || '#888';
            const apiVal = i.label.toLowerCase().replace(/ /g, '_');
            return `<div class="legend-item clickable" data-drill-type="status" data-drill-val="${apiVal}" onclick="gameDrillRow(this)">
              <span class="legend-dot" style="background:${color}"></span><span>${esc(i.label)} ${pct}%</span>
            </div>`;
          }).join('')}
        </div>
      </div>` : ''}
    `;

    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.querySelectorAll('[data-w]').forEach(b => { b.style.width = b.dataset.w; });
    }));
  }

  let currentGameFilter = '';

  function setGameFilter(pill) {
    document.querySelectorAll('.status-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    currentGameFilter = pill.dataset.status;
    loadGameList(currentGameFilter);
  }

  async function doGameSearch() {
    const title = document.getElementById('game-search-input').value.trim();
    if (!title) return;
    const btn = document.getElementById('game-search-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';
    document.getElementById('game-search-results').innerHTML = '';
    try {
      const results = await apiFetch(`/games/search?title=${encodeURIComponent(title)}`);
      if (!results.length) {
        document.getElementById('game-search-results').innerHTML = '<div class="empty">No results found.</div>';
        return;
      }
      document.getElementById('game-search-results').innerHTML = results.map(r => `
        <div class="game-card">
          <div class="game-card-body">
            ${igdbCoverImg(r.cover_image_id, 'game-cover-lg')}
            <div class="game-card-info">
              <div class="game-card-title">${esc(r.name)}</div>
              <div class="game-card-meta">${r.year || 'Unknown year'}</div>
              ${r.summary ? `<div class="game-card-overview">${esc(r.summary)}</div>` : ''}
            </div>
          </div>
          <div class="game-card-actions">
            <select id="gstatus-${r.id}" onchange="toggleGameDate(${r.id})">
              <option value="completed">Completed</option>
              <option value="playing">Playing</option>
              <option value="want_to_play">Want to Play</option>
              <option value="dropped">Dropped</option>
            </select>
            <input type="date" id="gdate-${r.id}" value="${today()}" style="display:none">
            <label id="g100-label-${r.id}" style="display:none;font-size:0.8rem;color:var(--muted);white-space:nowrap;cursor:pointer">
              <input type="checkbox" id="g100-${r.id}"> 100%
            </label>
            <button data-id="${r.id}" data-name="${esc(r.name)}" onclick="addGameBtn(this)">Add</button>
          </div>
        </div>`).join('');
      // Show date field for completed by default
      results.forEach(r => toggleGameDate(r.id));
    } catch (e) {
      toast(e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Search';
    }
  }

  function toggleGameDate(id) {
    const status = document.getElementById(`gstatus-${id}`)?.value;
    const show = ['completed', 'dropped'].includes(status);
    const dateEl = document.getElementById(`gdate-${id}`);
    const labelEl = document.getElementById(`g100-label-${id}`);
    if (dateEl) dateEl.style.display = show ? 'block' : 'none';
    if (labelEl) labelEl.style.display = status === 'completed' ? 'flex' : 'none';
  }

  async function addGameBtn(btn) {
    const id   = parseInt(btn.dataset.id);
    const name = btn.dataset.name;
    const status = document.getElementById(`gstatus-${id}`).value;
    const dateEl = document.getElementById(`gdate-${id}`);
    const date_completed   = dateEl?.style.display !== 'none' ? dateEl.value : null;
    const completed_fully  = document.getElementById(`g100-${id}`)?.checked || false;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';
    try {
      await apiFetch('/games/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ igdb_id: id, status, date_completed: date_completed || null, completed_fully }),
      });
      btn.textContent = '✓ Added';
      btn.classList.add('btn-added');
      toast(`Added: ${name}`, 'success');
    } catch (e) {
      toast(e.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Add';
    }
  }

  async function loadGameList(status = '') {
    const el = document.getElementById('game-list');
    el.innerHTML = '<div class="loading">Loading&hellip;</div>';
    try {
      const games = await apiFetch(`/games${status ? '?status=' + status : ''}`);
      if (!games.length) {
        el.innerHTML = '<div class="empty">No games yet.</div>';
        return;
      }
      el.innerHTML = games.map(g => `
        <div class="game-item" id="gi-${g.id}">
          ${igdbCoverImg(g.cover_image_id, 'game-cover-sm', 'cover_small')}
          <div class="gi-info" style="cursor:pointer" onclick="openNotes('game',${g.id},'${esc(g.name)}')">
            <div class="gi-title">${esc(g.name)}${g.has_notes ? '<span class="note-dot"></span>' : ''}</div>
            <div class="gi-meta">
              ${g.year || '—'}
              ${g.developers?.length ? ' &middot; ' + esc(g.developers[0]) : ''}
              &middot; <span onclick="event.stopPropagation();openStatusPicker(${g.id},'${esc(g.name)}','${g.status}','${g.date_completed||''}')" style="cursor:pointer">${statusBadge(g.status)}</span>
              ${g.completed_fully ? ' <span class="status-badge" style="background:#1a2a3a;color:#5b8dee">100%</span>' : ''}
              ${g.date_completed ? ' &middot; ' + g.date_completed.slice(0,10) : ''}
            </div>
          </div>
          <button class="btn-icon" data-id="${g.id}" data-name="${esc(g.name)}"
                  onclick="removeGameBtn(this)" title="Remove">&times;</button>
        </div>`).join('');
    } catch (e) {
      toast(e.message, 'error');
      el.innerHTML = '';
    }
  }

  function removeGameBtn(btn) {
    removeGame(btn.dataset.id, btn.dataset.name);
  }

  async function removeGame(id, name) {
    if (!confirm(`Remove "${name}"?`)) return;
    try {
      await apiFetch(`/games/${id}`, { method: 'DELETE' });
      document.getElementById(`gi-${id}`)?.remove();
      toast(`Removed: ${name}`, 'success');
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  // ── Battle ────────────────────────────────────────────────────────────────

  let battleMode = 'movies';

  function openBattle(mode = 'movies') {
    battleMode = mode;
    document.getElementById('battle-overlay').style.display = 'flex';
    document.getElementById('bo-battle').style.display = 'flex';
    document.getElementById('bo-rankings').style.display = 'none';
    document.getElementById('bo-title').textContent = mode === 'games' ? 'Game Battles' : 'Movie Battles';
    document.getElementById('bo-right-btn').textContent = 'Rankings';
    document.getElementById('bo-right-btn').onclick = showBattleRankings;
    loadBattle();
  }

  function closeBattle() {
    document.getElementById('battle-overlay').style.display = 'none';
  }

  async function loadBattle() {
    document.getElementById('bo-arena').innerHTML = '<div class="loading">Loading&hellip;</div>';
    try {
      const endpoint = battleMode === 'games' ? '/game_battle/next' : '/battle/next';
      renderBattleArena(await apiFetch(endpoint));
    } catch (e) {
      document.getElementById('bo-arena').innerHTML = `<div class="empty">${esc(e.message)}</div>`;
    }
  }

  function renderBattleArena(data) {
    document.getElementById('bo-progress').textContent =
      `${data.ranked_count} of ${data.total_films} ranked`;
    document.getElementById('bo-arena').innerHTML =
      battleCardHTML(data.challenger) +
      '<div class="battle-vs">VS</div>' +
      battleCardHTML(data.opponent);
  }

  function battleCardHTML(film) {
    let poster;
    if (battleMode === 'games') {
      const url = igdbCoverUrl(film.cover_image_id, 'cover_big');
      poster = url ? `<img class="battle-poster" src="${url}" alt="" loading="lazy">` : `<div class="battle-poster"></div>`;
    } else {
      const url = posterUrl(film.poster_path, 'w185');
      poster = url ? `<img class="battle-poster" src="${url}" alt="" loading="lazy">` : `<div class="battle-poster"></div>`;
    }
    const facts = battleMode === 'games'
      ? [
          film.developer   ? `<div class="battle-fact"><b>Dev</b>${esc(film.developer)}</div>`   : '',
          film.lead_writer ? `<div class="battle-fact"><b>Writer</b>${esc(film.lead_writer)}</div>` : '',
          film.composer    ? `<div class="battle-fact"><b>Music</b>${esc(film.composer)}</div>`  : '',
        ]
      : [
          film.director    ? `<div class="battle-fact"><b>Dir</b>${esc(film.director)}</div>`    : '',
          film.cast?.length ? `<div class="battle-fact"><b>Cast</b>${film.cast.map(esc).join(', ')}</div>` : '',
          film.composer    ? `<div class="battle-fact"><b>Music</b>${esc(film.composer)}</div>`  : '',
        ];
    return `<div class="battle-card" data-id="${film.id}" onclick="chooseSide(this)">
      ${poster}
      <div class="battle-details">
        <div class="battle-title">${esc(film.title)}</div>
        <div class="battle-year">${film.year || '—'}</div>
        ${facts.join('')}
      </div>
    </div>`;
  }

  async function chooseSide(card) {
    const arena = document.getElementById('bo-arena');
    arena.querySelectorAll('.battle-card').forEach(c => { c.onclick = null; });
    card.classList.add('battle-winner');
    arena.querySelectorAll('.battle-card').forEach(c => {
      if (c !== card) c.classList.add('battle-loser');
    });

    await new Promise(r => setTimeout(r, 500));

    try {
      const endpoint = battleMode === 'games' ? '/game_battle/result' : '/battle/result';
      const result = await apiFetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ winner_id: parseInt(card.dataset.id) }),
      });

      if (result.status === 'placed') {
        arena.innerHTML = `<div class="battle-placed"><div class="bp-rank">#${result.new_rank}</div><div class="bp-label">Ranked!</div></div>`;
        await new Promise(r => setTimeout(r, 900));
      }

      loadBattle();
    } catch (e) {
      toast(e.message, 'error');
      loadBattle();
    }
  }

  async function showBattleRankings() {
    document.getElementById('bo-battle').style.display = 'none';
    document.getElementById('bo-rankings').style.display = 'flex';
    document.getElementById('bo-title').textContent = 'Rankings';
    document.getElementById('bo-right-btn').textContent = '← Battle';
    document.getElementById('bo-right-btn').onclick = showBattleArena;

    const el = document.getElementById('bo-rankings-list');
    el.innerHTML = '<div class="loading">Loading&hellip;</div>';
    try {
      const endpoint = battleMode === 'games' ? '/game_battle/rankings' : '/battle/rankings';
      const rankings = await apiFetch(endpoint);
      if (!rankings.length) {
        el.innerHTML = '<div class="empty">No rankings yet — start battling!</div>';
        return;
      }
      const label = battleMode === 'games' ? 'Ranked Games' : 'Ranked Films';
      el.innerHTML = `<div class="bo-section-label">${label}</div>` +
        rankings.map(r => {
          const img = battleMode === 'games'
            ? igdbCoverImg(r.cover_image_id, 'poster-xs', 'cover_small')
            : posterImg(r.poster_path, 'poster-xs');
          return `<div class="rank-item">
            <span class="rank-num">#${r.rank}</span>
            ${img}
            <div class="rank-info">
              <div class="rank-title">${esc(r.title)}</div>
              <div class="rank-meta">${r.year || '—'} &middot; Ranked ${r.date_ranked ? r.date_ranked.slice(0,10) : '?'}</div>
            </div>
          </div>`;
        }).join('');
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  function showBattleArena() {
    document.getElementById('bo-rankings').style.display = 'none';
    document.getElementById('bo-battle').style.display = 'flex';
    document.getElementById('bo-title').textContent = battleMode === 'games' ? 'Game Battles' : 'Movie Battles';
    document.getElementById('bo-right-btn').textContent = 'Rankings';
    document.getElementById('bo-right-btn').onclick = showBattleRankings;
  }

  // ── Game drill-down ───────────────────────────────────────────────────────

  function gameDrillRow(el) {
    gameDrillDown(el.dataset.drillType, el.dataset.drillVal);
  }

  async function gameDrillDown(type, value) {
    document.getElementById('drill-title').textContent = value;
    document.getElementById('drill-list').innerHTML = '<div class="loading">Loading&hellip;</div>';
    document.getElementById('drill-modal').style.display = 'flex';
    try {
      const games = await apiFetch(`/games/stats/titles?type=${encodeURIComponent(type)}&value=${encodeURIComponent(value)}`);
      if (!games.length) {
        document.getElementById('drill-list').innerHTML = '<div class="empty">No games found.</div>';
        return;
      }
      document.getElementById('drill-list').innerHTML = games.map((g, i) => `
        <div class="drill-item">
          <span class="drill-num">${i + 1}</span>
          ${igdbCoverImg(g.cover_image_id, 'poster-xs', 'cover_small')}
          <div class="drill-info">
            <div class="drill-title">${esc(g.name)}</div>
            <div class="drill-meta">
              ${g.year || '—'} &middot; ${statusBadge(g.status)}
              ${g.completed_fully ? ' <span class="status-badge" style="background:#1a2a3a;color:#5b8dee">100%</span>' : ''}
              ${g.date_completed ? ' &middot; ' + g.date_completed.slice(0,10) : ''}
            </div>
          </div>
        </div>`).join('');
    } catch (e) {
      toast(e.message, 'error');
      document.getElementById('drill-modal').style.display = 'none';
    }
  }

  // ── Drill-down ────────────────────────────────────────────────────────────

  function drillRow(el) {
    drillDown(el.dataset.drillType, el.dataset.drillVal);
  }

  async function drillDown(type, value) {
    const apiValue = type === 'decade' ? value.replace(/s$/i, '') : value;
    document.getElementById('drill-title').textContent = value;
    document.getElementById('drill-list').innerHTML = '<div class="loading">Loading&hellip;</div>';
    document.getElementById('drill-modal').style.display = 'flex';

    try {
      const films = await apiFetch(`/stats/films?type=${encodeURIComponent(type)}&value=${encodeURIComponent(apiValue)}`);
      if (!films.length) {
        document.getElementById('drill-list').innerHTML = '<div class="empty">No films found.</div>';
        return;
      }
      document.getElementById('drill-list').innerHTML = films.map((f, i) => `
        <div class="drill-item">
          <span class="drill-num">${i + 1}</span>
          ${posterImg(f.poster_path, 'poster-xs')}
          <div class="drill-info">
            <div class="drill-title">${esc(f.title)}</div>
            <div class="drill-meta">${f.year || '—'}${f.rating ? ' &middot; ★ ' + f.rating : ''}</div>
          </div>
        </div>`).join('');
    } catch (e) {
      toast(e.message, 'error');
      document.getElementById('drill-modal').style.display = 'none';
    }
  }

  function closeDrill() {
    document.getElementById('drill-modal').style.display = 'none';
  }

  // ── Helpers ──────────────────────────────────────────────────────────────

  const TMDB_IMG = 'https://image.tmdb.org/t/p/';
  function posterUrl(path, size = 'w92') {
    return path ? `${TMDB_IMG}${size}${path}` : null;
  }
  function posterImg(path, cls, size = 'w92') {
    const url = posterUrl(path, size);
    return url
      ? `<img class="${cls}" src="${url}" alt="" loading="lazy">`
      : `<div class="${cls}"></div>`;
  }

  function today() {
    return new Date().toISOString().slice(0, 10);
  }

  function esc(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
